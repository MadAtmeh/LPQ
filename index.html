<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Projects</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    }
    header {
      text-align: center;
      padding: 60px 20px;
    }
    h1 {
      font-size: 2.5rem;
    }
    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      transition: 0.3s;
    }
    .card:hover {
      transform: translateY(-5px);
      background: #334155;
    }
    a {
      color: #38bdf8;
      text-decoration: none;
    }
  </style>
</head>
<body>

<header>
  <h1>My GitHub Projects</h1>
  <p>Welcome! Here are some of my works.</p>
</header>

<section class="projects">

  <div class="card">
    <h3>Project 1</h3>
    <p>Short description of your project.</p>
    <a href="https://github.com/yourusername/project1">View on GitHub →</a>
  </div>

  <div class="card">
    <h3>Project 2</h3>
    <p>Another cool project.</p>
    <a href="https://github.com/yourusername/project2">View on GitHub →</a>
  </div>

</section>

</body>
</html>
